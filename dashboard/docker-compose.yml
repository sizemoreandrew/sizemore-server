services:
  landing-page:
    image: nginx:alpine
    container_name: landing-page
    ports:
      - "80:80"
    volumes:
      - ./landing-page:/usr/share/nginx/html:ro
      - ./landing-page/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=andrewsizemore.tv,dashboard.andrewsizemore.tv,localhost,127.0.0.1,homepage,homepage:3000
    ports:
      - "3001:3000"
    volumes:
      - ./homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin-config:/config
      - ./jellyfin-cache:/cache
      - /srv/media:/media
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8080
    ports:
      - "8081:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ./qbittorrent-config:/config
      - /srv/media:/media
      - /srv/media:/media
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    ports:
      - "7878:7878"
    volumes:
      - ./radarr-config:/config
      - /srv/media:/media
      - /srv/media:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    ports:
      - "8989:8989"
    volumes:
      - ./sonarr-config:/config
      - /srv/media:/media
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Los_Angeles
    ports:
      - "5055:5055"
    volumes:
      - ./jellyseerr-config:/app/config
    restart: unless-stopped

  polls:
    build: ./polls
    container_name: polls
    ports:
      - "8085:8085"
    environment:
      - SECRET_KEY=${POLLS_SECRET_KEY}
      - ADMIN_PASSWORD=${POLLS_ADMIN_PASSWORD}
    volumes:
      - ./polls-data:/data
    restart: unless-stopped

  randomcard:
    image: nginx:alpine
    container_name: randomcard
    ports:
      - "8084:80"
    volumes:
      - ./randomcard:/usr/share/nginx/html:ro
    restart: unless-stopped

  bookrecs:
    build: ./bookrecs
    container_name: bookrecs
    ports:
      - "8083:8083"
    environment:
      - SECRET_KEY=${BOOKRECS_SECRET_KEY}
      - ADMIN_PASSWORD=${BOOKRECS_ADMIN_PASSWORD}
    volumes:
      - ./bookrecs-data:/data
    restart: unless-stopped

  wordpress-db:
    image: mariadb:11
    container_name: wordpress-db
    environment:
      - MYSQL_ROOT_PASSWORD=${WORDPRESS_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=${WORDPRESS_DB_PASSWORD}
    volumes:
      - ./wordpress-db:/var/lib/mysql
    restart: unless-stopped

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    depends_on:
      - wordpress-db
    ports:
      - "8082:80"
    environment:
      - WORDPRESS_DB_HOST=wordpress-db
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - WORDPRESS_CONFIG_EXTRA=define('WP_HOME','https://blog.andrewsizemore.tv');define('WP_SITEURL','https://blog.andrewsizemore.tv');
    volumes:
      - ./wordpress-data:/var/www/html
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3030:3000"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
