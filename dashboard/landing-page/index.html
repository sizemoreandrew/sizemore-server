<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Andrew Sizemore Portal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    .card {
      background: #111827;
      padding: 40px;
      border-radius: 20px;
      width: min(700px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      text-align: center;
    }
    h1 { margin-top: 0; }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    a {
      text-decoration: none;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
      background: #2563eb;
    }
    a.purple  { background: #7c3aed; }
    a.green   { background: #059669; }
    a.rose    { background: #e11d48; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Andrew Sizemore</h1>
    <p>Choose where you want to go.</p>
    <div class="buttons">
      <a href="https://streaming.andrewsizemore.tv">Streaming</a>
      <a class="purple" href="https://request.andrewsizemore.tv">Requests</a>
      <a class="green" href="https://dashboard.andrewsizemore.tv">Dashboard</a>
      <a class="rose" href="https://blog.andrewsizemore.tv">Blog</a>
    </div>
  </div>
</body>
</html>
