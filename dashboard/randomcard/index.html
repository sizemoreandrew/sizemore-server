<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Random Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0806;
      color: #e8d5b0;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 28px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: #c9a96e;
      letter-spacing: 0.08em;
      text-align: center;
      text-shadow: 0 0 20px rgba(201,169,110,0.4);
    }

    /* Card stage */
    .card-stage {
      position: relative;
      width: min(340px, 86vw);
      aspect-ratio: 63 / 88;
    }

    .card-display {
      width: 100%;
      height: 100%;
      border-radius: 4.75% / 3.4%;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 20px 60px rgba(0,0,0,0.8);
    }

    .card-display img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: inherit;
    }

    @keyframes cardReveal {
      0%   { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }
    .card-display.reveal {
      animation: cardReveal 0.4s cubic-bezier(0.2, 0, 0.2, 1) forwards;
    }

    .card-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1008, #0d0804);
      border: 1px solid #3a2510;
      border-radius: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #5a4030;
    }
    .card-placeholder .mtg-icon { font-size: 4rem; }
    .card-placeholder p { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.1em; }

    /* Double-faced card navigation */
    .face-nav {
      display: none;
      gap: 10px;
      align-items: center;
    }
    .face-nav.show { display: flex; }
    .face-btn {
      background: #1c1208;
      border: 1px solid #5a3a18;
      border-radius: 8px;
      color: #c9a96e;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .face-btn:hover, .face-btn.active { background: #2a1a08; border-color: #c9a96e; }

    /* Card info */
    .card-info {
      text-align: center;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #e8d5b0;
    }
    .card-meta {
      font-style: italic;
      font-size: 0.85rem;
      color: #9a8060;
    }

    /* Draw button */
    .draw-btn {
      background: linear-gradient(135deg, #3a2008, #5a3010);
      border: 1px solid #c9a96e;
      border-radius: 14px;
      color: #c9a96e;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      letter-spacing: 0.1em;
      padding: 16px 44px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 0 0 rgba(201,169,110,0);
    }
    .draw-btn:hover {
      background: linear-gradient(135deg, #4a2a0a, #6a4020);
      box-shadow: 0 0 24px rgba(201,169,110,0.25);
    }
    .draw-btn:active { transform: scale(0.97); }
    .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Loading shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #1a1008 25%, #2a1a08 50%, #1a1008 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
      display: none;
    }
    .loading-overlay.show { display: block; }
  </style>
</head>
<body>

  <h1>✦ Draw a Card ✦</h1>

  <div class="card-stage">
    <div class="card-display" id="cardDisplay">
      <div class="card-placeholder">
        <span class="mtg-icon">🃏</span>
        <p>AWAITING YOUR DRAW</p>
      </div>
    </div>
    <div class="loading-overlay" id="loadingOverlay"></div>
  </div>

  <div class="face-nav" id="faceNav">
    <button class="face-btn active" id="face0Btn" onclick="showFace(0)">Front</button>
    <button class="face-btn" id="face1Btn" onclick="showFace(1)">Back</button>
  </div>

  <div class="card-info">
    <div class="card-name" id="cardName"></div>
    <div class="card-meta" id="cardMeta"></div>
  </div>

  <button class="draw-btn" id="drawBtn" onclick="drawCard()">✦ DRAW A CARD ✦</button>

  <script>
    let cardFaces = [];
    let currentFace = 0;

    async function drawCard() {
      const btn = document.getElementById('drawBtn');
      const overlay = document.getElementById('loadingOverlay');
      btn.disabled = true;
      overlay.classList.add('show');
      document.getElementById('faceNav').classList.remove('show');
      document.getElementById('cardName').textContent = '';
      document.getElementById('cardMeta').textContent = '';

      try {
        const res = await fetch('https://api.scryfall.com/cards/random');
        const card = await res.json();

        if (card.card_faces && card.card_faces[0].image_uris) {
          cardFaces = card.card_faces.map(f => f.image_uris.large || f.image_uris.normal);
          document.getElementById('face0Btn').textContent = card.card_faces[0].name || 'Front';
          document.getElementById('face1Btn').textContent = card.card_faces[1].name || 'Back';
          document.getElementById('faceNav').classList.add('show');
        } else {
          cardFaces = [card.image_uris?.large || card.image_uris?.normal];
        }

        currentFace = 0;
        overlay.classList.remove('show');
        showImage(cardFaces[0]);

        document.getElementById('cardName').textContent = card.name;
        const parts = [card.type_line, card.set_name, card.released_at?.slice(0,4)].filter(Boolean);
        document.getElementById('cardMeta').textContent = parts.join(' · ');

      } catch (e) {
        overlay.classList.remove('show');
        document.getElementById('cardName').textContent = 'Failed to draw — try again';
      }

      btn.disabled = false;
    }

    function showImage(src) {
      const display = document.getElementById('cardDisplay');
      display.classList.remove('reveal');
      display.innerHTML = `<img src="${src}" alt="MTG Card">`;
      void display.offsetWidth;
      display.classList.add('reveal');
    }

    function showFace(index) {
      currentFace = index;
      document.querySelectorAll('.face-btn').forEach((b, i) =>
        b.classList.toggle('active', i === index)
      );
      showImage(cardFaces[index]);
    }
  </script>
</body>
</html>
