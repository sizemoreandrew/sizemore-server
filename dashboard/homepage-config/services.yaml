- Server 2:
    - CPU Usage:
        widget:
          type: glances
          url: http://10.0.0.142:61208
          version: 4
          metric: cpu

    - Memory Usage:
        widget:
          type: glances
          url: http://10.0.0.142:61208
          version: 4
          metric: memory

    - Uptime:
        widget:
          type: glances
          url: http://10.0.0.142:61208
          version: 4
          metric: uptime

    - D Drive Free:
        widget:
          type: glances
          url: http://10.0.0.142:61208
          version: 4
          metric: fs:D:\

    - C Drive Free:
        widget:
          type: glances
          url: http://10.0.0.142:61208
          version: 4
          metric: fs:C:\
