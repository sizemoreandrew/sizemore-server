        container: grafana

    - Prometheus:
        icon: prometheus
        href: http://localhost:9090
        container: prometheus

    - Portainer:
        icon: portainer
        href: http://localhost:9000
        container: portainer

- AI:
    - Open WebUI:
        icon: open-webui
        href: http://localhost:3000
        container: openwebui

    - Ollama:
        icon: ollama
        href: http://localhost:11434
